# All DQN hyperparameters live here — never inline a magic number in code.
# Loaded into a frozen Config dataclass (see src/flappy_rl/config.py).
# These values reproduce the run that produced models/dqn_final.pth.

run_name: dqn_baseline        # experiment sub-folder name under experiments/
seed: 42

# --- rollout / environment ---
num_envs: 15                  # parallel worker environments
total_env_steps: 10000000     # total environment steps to train for
max_steps_per_ep: 4000        # force-reset an env after this many steps
action_repeat: 2              # repeat each chosen action N frames

# --- replay buffer ---
buffer_size: 1000000
batch_size: 256
warmup_steps: 100000          # collect random transitions before learning

# --- optimization / learning ---
lr: 0.00025
gamma: 0.99
target_tau: 0.005             # soft target-network update rate
grad_clip_norm: 5.0
update_ratio: 1.0             # gradient updates per single env step

# --- exploration (epsilon linear decay over env steps) ---
eps_start: 1.0
eps_end: 0.05
eps_decay_steps: 6000000

# --- reward shaping (consumed by envs/wrappers.py) ---
reward_death: -1.0
reward_pass_pipe: 10.0
reward_alive: 0.01
reward_flap_pen: -0.003
center_bonus_w: 0.90          # bonus for sitting near the gap center
bonus_dx_window: 0.35         # only pay the center bonus within this horizontal window

# --- network (must match the saved weights: MLP state_dim -> hidden -> hidden -> n_actions) ---
state_dim: 7
hidden: 512
n_actions: 2

# --- logging / checkpointing ---
log_every_updates: 5000
save_every_steps: 500000
